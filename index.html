<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Calistoga&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Sriracha&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>DevClub - Gerador de IA</title>
</head>

<body>
    <h1>
        CSS Gerador <span>com IA</span> ⚡️
    </h1>
    <p>Descreva o que você imagina e veja a mágica acontecer

    </p>
    <textarea rows="3" class="caixa-texto" placeholder="Ex: Bola azul pingando"></textarea>
    <button class="botao-gerar">Gerar Código ⚡️</button>
    <div class="resultado">
        <div>
            <p>Código</p>
            <p class="bloco-codigo"></p>
        </div>
        <div>
            <p>Preview</p>
            <iframe src="" frameborder="0" class="resultado-codigo"></iframe>
        </div>
    </div>
 
</body>

<script src="scritp.js">

</script>

</html>
